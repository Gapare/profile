<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fiks Terminal | Systems Architect</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d0d0d;
      color: #33ff33;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #terminal-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      overflow-y: auto;
      white-space: pre-wrap;
      scrollbar-width: thin;
      scrollbar-color: #33ff33 #0d0d0d;
    }
    #input-line {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }
    #prompt {
      margin-right: 10px;
      font-weight: bold;
    }
    #command-input {
      background: transparent;
      border: none;
      color: #33ff33;
      flex: 1;
      font-family: monospace;
      font-size: 16px;
      outline: none;
    }
    .output { margin-bottom: 8px; line-height: 1.4; }
    .command { color: #00ffff; font-weight: bold; }
    .error { color: #ff3333; }
    .success { color: #33ff33; }
    .highlight { color: #fbbf24; } /* Amber for links/tech */
    
    .loading {
      display: inline-block;
      margin-right: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #33ff33;
      animation: blink 1s infinite;
    }
    .loading:nth-child(2) { animation-delay: 0.2s; }
    .loading:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="terminal-container">
    <div id="output" class="output"></div>
    <div id="input-line">
      <span id="prompt">guest@fiks.dev:~$</span>
      <input id="command-input" type="text" autofocus autocomplete="off" placeholder="Type 'help'...">
    </div>
  </div>

  <script>
    const terminal = document.getElementById("terminal-container");
    const outputDiv = document.getElementById("output");
    const commandInput = document.getElementById("command-input");
    const prompt = document.getElementById("prompt");

    let currentDir = "~"; 
    let fileSystem = {
      "~": ["projects", "README.md", "system_logs"],
      "projects": ["jackal_pos", "transit_audit", "rural_inventory"],
      "system_logs": ["kernel.log", "auth.log"]
    };

    const commands = {
      help: () => "Available commands: help, about, skills, projects, blog, contact, ls, cd, clear, gui, exit",
      about: async () => await fetchCommand("about"),
      skills: async () => await fetchCommand("skills"),
      projects: async () => await fetchCommand("projects"),
      blog: async () => await fetchCommand("blog"),
      contact: async () => await fetchCommand("contact"),
      clear: () => "__clear__",
      // RETURN TO MAIN SITE
      gui: () => {
          appendOutput("Switching to Graphical User Interface...", "success");
          setTimeout(() => window.location.href = "/", 1000);
          return "Redirecting...";
      },
      exit: () => {
          appendOutput("Closing session...", "error");
          setTimeout(() => window.location.href = "/", 1000);
          return "Goodbye.";
      },
      ls: () => {
        let items = fileSystem[currentDir] || [];
        return items.map(i => fileSystem[i] ? `📂 ${i}` : `📄 ${i}`).join("  ");
      },
      cd: (arg) => {
        if(!arg || arg === "~") { currentDir = "~"; updatePrompt(); return ""; }
        if(arg === "..") {
          if(currentDir !== "~") currentDir = "~";
          updatePrompt();
          return "";
        }
        if(fileSystem[currentDir] && fileSystem[currentDir].includes(arg) && fileSystem[arg]) {
          currentDir = arg;
          updatePrompt();
          return "";
        }
        return `Directory not found: ${arg}`;
      }
    };

    async function fetchCommand(cmd) {
      try {
        const res = await fetch(`/api/terminal/?command=${cmd}`);
        if (!res.ok) return `Error: ${res.status} - Could not reach Fiks Backend`;
        const data = await res.json();

        if(cmd === "projects") {
          if(data.projects && data.projects.length > 0){
            return data.projects.map((p, i) => {
              let out = `[${i+1}] ${p.title.toUpperCase()}\n`;
              out += `    Desc: ${p.description}\n`;
              out += `    Tech: ${p.tech_used}\n`;
              if(p.download_url) out += `    Download: ${p.download_url}\n`;
              if(p.github_url)   out += `    GitHub:   ${p.github_url}`;
              return out;
            }).join('\n\n');
          } else return "No active projects found in database.";
        }

        if(cmd === "skills") {
          if(data.skills && data.skills.length > 0){
            return data.skills.map(s => {
                const dots = ".".repeat(Math.floor(s.proficiency / 10));
                const empty = " ".repeat(10 - dots.length);
                return `${s.name.padEnd(15)} [${dots}${empty}] ${s.proficiency}%`;
            }).join('\n');
          } else return "No skills indexed.";
        }

        if(cmd === "about") return data.about || "Architect profile missing.";
        if(cmd === "contact") return data.contact || "Comms offline.";
        
        return data.output || `No data for ${cmd}`;
      } catch (err) {
        return `Connection Error: Check if server is live.`;
      }
    }

    function appendOutput(text, type="normal") {
      if(!text) return;
      const div = document.createElement("div");
      div.classList.add("output");
      if(type === "command") div.classList.add("command");
      if(type === "error") div.classList.add("error");
      if(type === "success") div.classList.add("success");
      div.innerText = text;
      outputDiv.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function updatePrompt() {
      prompt.innerText = `guest@fiks.dev:${currentDir}$`;
    }

    function loadingAnimation(callback) {
      const loadingDiv = document.createElement("div");
      loadingDiv.classList.add("output");
      loadingDiv.innerHTML = '<span class="loading"></span><span class="loading"></span><span class="loading"></span> Booting FiksOS v2.0...';
      outputDiv.appendChild(loadingDiv);
      setTimeout(() => {
        loadingDiv.remove();
        callback();
      }, 1500);
    }

    function startTerminal() {
      appendOutput("Fiks Systems Architecture [Version 2.0.26]");
      appendOutput("(c) 2026 The Jackal Systems. All rights reserved.");
      appendOutput("---");
      appendOutput("Type 'projects' to see software or 'gui' to return to visual site.");
      commandInput.focus();
    }

    commandInput.addEventListener("keydown", async function(e) {
      if(e.key === "Enter") {
        let input = commandInput.value.trim();
        appendOutput(`${prompt.innerText} ${input}`, "command");

        if(input) {
          let [cmd, ...args] = input.split(" ");
          if(commands[cmd.toLowerCase()]) {
            let result = commands[cmd.toLowerCase()](args.join(" "));
            if(result instanceof Promise) result = await result;
            if(result === "__clear__") outputDiv.innerHTML = "";
            else appendOutput(result);
          } else {
            appendOutput(`'${cmd}' is not recognized as an internal command.`, "error");
          }
        }
        commandInput.value = "";
      }
    });

    loadingAnimation(startTerminal);
    // Keep focus on input
    document.addEventListener("click", () => commandInput.focus());
  </script>
</body>
</html>
